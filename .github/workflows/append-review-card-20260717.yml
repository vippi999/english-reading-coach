name: Append Lesson 4 review card once

on:
  push:
    paths:
      - '.github/workflows/append-review-card-20260717.yml'

permissions:
  contents: write

jobs:
  append-card:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Append review card
        shell: python
        run: |
          import json
          from pathlib import Path

          path = Path("review_items.json")
          data = json.loads(path.read_text(encoding="utf-8"))

          card = {
              "id": "rules1-l4-here-after-done",
              "source": {
                  "book": "The Rules 1",
                  "unit": "Lesson 4",
                  "location": "Session 4",
                  "excerpt": "Here is ... exercise after learning ... if done ..."
              },
              "target": "Here is／after／done",
              "category": "word_or_chunk",
              "prompt": "Here is／after／done",
              "answer_core": "Here is は「ここに」、after は右向き矢印、done はおとなしく「される」と訳す。",
              "usage_examples": [
                  {
                      "english": "Here is ... exercise after learning ... if done ...",
                      "japanese": "「ここに」／学習→運動／「される」"
                  }
              ],
              "card_sentence": {
                  "before": "Here is／after／done：",
                  "hidden": "「ここに」／右向き矢印／おとなしく「される」",
                  "after": ""
              },
              "initial_processing": "Here is・after・doneの読み方を第一段落で確認した。",
              "cue": "Here isは「ここに」、afterは右向き矢印、doneはおとなしく「される」。",
              "created_at": "2026-07-17",
              "learned_on": "2026-07-17"
          }

          items = data.setdefault("items", [])
          if not any(item.get("id") == card["id"] for item in items):
              items.append(card)
              path.write_text(
                  json.dumps(data, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8"
              )

      - name: Remove one-time workflow and commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/append-review-card-20260717.yml
          git add review_items.json .github/workflows/append-review-card-20260717.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Add Lesson 4 first-paragraph review card"
          git push
