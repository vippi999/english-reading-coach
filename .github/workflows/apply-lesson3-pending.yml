name: Fix Lesson 3 report placement

on:
  push:
    paths:
      - lesson3_pending_update.json

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fix report
        run: |
          python - <<'PY'
          from pathlib import Path

          pending_path = Path('lesson3_pending_update.json')
          report_path = Path('実読チャット報告_2026-07-13.md')
          report = report_path.read_text(encoding='utf-8')

          completion = """### Lesson 3完了時の追記
- ユーザーの直接申告により、Lesson 3は精読・カード選定まで完了扱いとする。
- 設問は未実施で、Lesson 12終了後まで保留する。
- 最終カード確認では、`as`、名詞`need`、`suffering`、過去から見た未来の`would`、`ever`、反復を示す`even`、`out of`、`accordingly`、`handle`、`the way + S′V′`、`vital`、`pleasure + take over`、`reframe`を追加・更新対象とした。
- `even`について、AIが一度『反復ではない』と誤って訂正した。参考書写真には明確に『evenは反復の目印』とあり、AIの訂正を撤回した。カードは本人の表現『evenは大袈裟な反復の目印』で保存する。
- 次はLesson 4へ進む。初読では目標時間を優先せず、時間を気にせず一回でゆっくり正確に読み切る方法を試す。
"""

          report = report.replace(completion + '\n', '')
          report = report.replace('- セッション数: 3（Session 3進行中）', '- セッション数: 3（Session 3完了）')
          report = report.replace(
              '- 第1〜2段落の参考書確認とカード文面の確定は進行中。',
              '- 第1〜4段落の初読処理確認・精読・カード選定を完了した。'
          )

          session3_pos = report.index('## Session 3｜Lesson 3')
          question_pos = report.index('### 設問の扱い', session3_pos)
          report = report[:question_pos] + completion + '\n' + report[question_pos:]

          report_path.write_text(report, encoding='utf-8')
          pending_path.unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '実読チャット報告_2026-07-13.md' lesson3_pending_update.json
          git commit -m "Fix Lesson 3 report placement"
          git push
